<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
  :root {
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #0f172a;
    background: #f8fafc;
  }
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #app {
    width: min(480px, calc(100vw - 2rem));
    padding: 1.5rem;
    border-radius: 1rem;
    background: white;
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.15);
  }
  h1 {
    margin-top: 0;
    margin-bottom: 0.5rem;
    font-size: 1.75rem;
    text-align: center;
  }
  p.subtitle {
    margin-top: 0;
    margin-bottom: 0.75rem;
    text-align: center;
    color: #475569;
  }
  .param-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .param-grid div {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 0.5rem;
    padding: 0.5rem 0.75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .param-grid .label {
    text-transform: uppercase;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    color: #94a3b8;
    margin-bottom: 0.1rem;
  }
  .param-grid .value {
    font-weight: 600;
    font-size: 1rem;
    color: #0f172a;
  }
  .board {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .cell {
    aspect-ratio: 1 / 1;
    border: 2px solid #e2e8f0;
    border-radius: 0.75rem;
    font-size: 1.75rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #0f172a;
    transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    background: #f8fafc;
  }
  .cell:hover {
    transform: translateY(-2px);
    border-color: #94a3b8;
  }
  .cell.disabled {
    cursor: not-allowed;
    opacity: 0.6;
    transform: none;
  }
  .cell.x {
    color: #dc2626;
    background: #fee2e2;
    border-color: #fecaca;
    font-size: 2.5rem;
  }
  .cell.o {
    color: #0891b2;
    background: #cffafe;
    border-color: #a5f3fc;
    font-size: 2.5rem;
  }
  .status {
    text-align: center;
    margin-bottom: 1rem;
    font-weight: 600;
  }
  .token-bar {
    font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    font-size: 0.85rem;
    background: #f1f5f9;
    border-radius: 0.5rem;
    padding: 0.5rem;
    text-align: center;
    margin-bottom: 1rem;
    white-space: nowrap;
    overflow-x: auto;
  }
  button.new-game {
    width: 100%;
    border: none;
    border-radius: 999px;
    background: #0ea5e9;
    color: white;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    box-shadow: 0 8px 20px rgba(14, 165, 233, 0.35);
  }
  button.new-game:hover {
    background: #0284c7;
    transform: translateY(-1px);
  }
  button.new-game:active {
    transform: translateY(0);
  }
</style>

        }
        return null;
      }

      function tokensForBoard(board) {
        return [BOS_ID].concat(board.map((cell) => stoi[cell])).concat([MOV_ID]);
      }

      function modelPickMove(params, board) {
        const moves = legalMoves(board);
        if (moves.length === 0) {
          return -1;
        }
        const contextTokens = tokensForBoard(board);
        const logits = forward(params, contextTokens);
        const lastLogits = logits[logits.length - 1];
        let bestMove = moves[0];
        let bestScore = -Infinity;
        for (const move of moves) {
          const tokenId = MOVE_TOKEN_IDS[move];
          const score = lastLogits[tokenId];
          if (score > bestScore) {
            bestScore = score;
            bestMove = move;
          }
        }
        return bestMove;
      }

      function makeCellLabel(value) {
        return value === "_" ? "" : value;
      }

      function setupGame(params) {
        const app = document.getElementById("app");
        if (!app) {
          throw new Error("Missing #app container");
        }
        let board = Array(9).fill("_");
        let gameOver = false;
        let thinking = false;

        app.innerHTML = "";

        const title = document.createElement("h1");
        title.textContent = "TicTacTokenizer";

        const subtitle = document.createElement("p");
        subtitle.className = "subtitle";
        subtitle.textContent = "8 Bit Quantized Decoder Transformer";

        const paramGrid = document.createElement("div");
        paramGrid.className = "param-grid";
        const specs = [
          ["n_layer", nLayer],
          ["n_embd", nEmb],
          ["block_size", blockSize],
          ["n_head", nHead],
          ["vocab_size", vocabSize],
          ["weights", `${weightSizeKB} KB`],
        ];
        specs.forEach(([label, value]) => {
          const cell = document.createElement("div");
          const labelEl = document.createElement("span");
          labelEl.className = "label";
          labelEl.textContent = label;
          const valueEl = document.createElement("span");
          valueEl.className = "value";
          valueEl.textContent = String(value);
          cell.appendChild(labelEl);
          cell.appendChild(valueEl);
          paramGrid.appendChild(cell);
        });

        const boardEl = document.createElement("div");
        boardEl.className = "board";

        const tokenBar = document.createElement("div");
        tokenBar.className = "token-bar";

        const statusEl = document.createElement("div");
        statusEl.className = "status";

        const newGameBtn = document.createElement("button");
        newGameBtn.className = "new-game";
        newGameBtn.type = "button";
        newGameBtn.textContent = "New Game";

        const cells = [];
        for (let i = 0; i < 9; i++) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "cell";
          btn.textContent = makeCellLabel(board[i]);
          btn.addEventListener("click", () => {
            if (gameOver || thinking) return;
            if (board[i] !== "_") return;
            board[i] = "X";
            updateBoard();
            maybeFinishTurn();
          });
          boardEl.appendChild(btn);
          cells.push(btn);
        }

        function updateTokens() {
          const tokens = ["BOS"].concat(board).concat(["MOV"]);
          tokenBar.textContent = tokens.map((tok) => `[${tok}]`).join("");
        }

        function updateBoard() {
          cells.forEach((cell, idx) => {
            const value = board[idx];
            cell.textContent = makeCellLabel(value);
            cell.classList.remove("x", "o", "disabled");
            if (value === "X") {
              cell.classList.add("x");
            } else if (value === "O") {
              cell.classList.add("o");
            }
            if (gameOver || thinking || value !== "_") {
              cell.classList.add("disabled");
            }
          });
          updateTokens();
        }

        function setStatus(message) {
          statusEl.textContent = message;
        }

        function resetGame() {
          board = Array(9).fill("_");
          gameOver = false;
          thinking = false;
          setStatus("You are X and move first.");
          cells.forEach((cell, idx) => {
            cell.classList.remove("disabled", "x", "o");
            cell.textContent = makeCellLabel("_");
          });
          updateBoard();
        }

        newGameBtn.addEventListener("click", () => {
          resetGame();
        });

        function conclude(result) {
          gameOver = true;
          thinking = false;
          if (result === "draw") {
            setStatus('Game over: draw. Hit "New Game" to try again.');
          } else if (result === "X") {
            setStatus('You win! Hit "New Game" for a rematch.');
          } else {
            setStatus('Model wins. Hit "New Game" to play again.');
          }
          updateBoard();
        }

        function maybeFinishTurn() {
          const winner = checkWinner(board);
          if (winner) {
            conclude(winner);
            return;
          }
          thinking = true;
          updateBoard();
          setStatus("Model thinking...");
          window.setTimeout(() => {
            const aiMove = modelPickMove(params, board);
            if (aiMove === -1) {
              conclude("draw");
              return;
            }
            const aiPlayer = currentPlayer(board);
            board[aiMove] = aiPlayer;
            const afterWinner = checkWinner(board);
            if (afterWinner) {
              conclude(afterWinner);
            } else {
              thinking = false;
              setStatus("Your turn.");
              cells.forEach((cell, idx) => {
                if (board[idx] === "_") {
                  cell.classList.remove("disabled");
                  cell.textContent = makeCellLabel("_");
                }
              });
              updateBoard();
            }
          }, 250);
        }

        resetGame();
        app.appendChild(title);
        app.appendChild(subtitle);
        app.appendChild(paramGrid);
        app.appendChild(boardEl);
        app.appendChild(tokenBar);
        app.appendChild(statusEl);
        app.appendChild(newGameBtn);
      }

      const params = loadQuantizedWeights(data);

      const start = () => setupGame(params);
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start, { once: true });
      } else {
        start();
      }

})();
</script>
</body>
</html>
